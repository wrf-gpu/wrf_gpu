[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "gpuwrf"
version = "0.0.0"
description = "AgentOS bootstrap for a GPU-native WRF-compatible regional NWP project"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "PyYAML>=6",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests", "evals/agentos"]
pythonpath = ["src"]
