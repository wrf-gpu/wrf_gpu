schema: OracleBaselineRegressionCases
schema_version: 1
description: >
  Multi-case Oracle-baseline manifest. CPU WRF is the Oracle whenever a case is
  runnable. BLOCKED cases remain in the manifest with the command needed to
  create the missing Oracle or runner artifact.
default_expected_variables:
  - U
  - V
  - W
  - theta
  - QVAPOR
  - PSFC
  - T2
  - U10
  - V10
  - SWDOWN
  - GLW
  - HFX
  - LH
  - PBLH
  - TSK
  - LU_INDEX
cases:
  - case_id: canary_20260521_24h_d02
    type: real
    status: AVAILABLE
    oracle:
      kind: cpu_wrf
      run_dir: <DATA_ROOT>/canairy_meteo/runs/wrf_l3/20260521_18z_l3_24h_20260522T133443Z
      domain: d02
      expected_forecast_hours: 24
      expected_wrfout_count_including_initial: 25
      source_note: Existing Gen2 CPU WRF L3 24h run.
    expected_variables: DEFAULT
    tolerance_class: EQUIVALENCE_TIGHT
    smoke: true
    gpu:
      runner: m7_daily_pipeline
      run_id: 20260521_18z_l3_24h_20260522T133443Z
      run_root: <DATA_ROOT>/canairy_meteo/runs/wrf_l3
      domain: d02
      full_hours: 24
      smoke_hours: 1

  - case_id: canary_20260521_72h_d02
    type: real
    status: BLOCKED
    blocked_reason: >
      The available 20260521 L2 72h CPU WRF directory exists but contains only
      20 hourly d02 wrfout files, through 2026-05-22 13:00:00 UTC, not the
      required 72h Oracle history.
    oracle:
      kind: cpu_wrf
      run_dir: <DATA_ROOT>/canairy_meteo/runs/wrf_l2/20260521_18z_l2_72h_20260522T133443Z
      domain: d02
      expected_forecast_hours: 72
      expected_wrfout_count_including_initial: 73
      observed_wrfout_count_including_initial: 20
      generation_command: >
        taskset -c 0-3 bash -lc 'source /home/user/src/canairy_meteo/Gen2/artifacts/wrf_gpu_src/env_wrf_gpu.sh
        && cd <prepared-20260521-18z-l2-72h-run-directory>
        && mpirun -np 28 /home/user/src/wrf_gpu/builds/stable_20260509T213321Z/wrf.exe'
    expected_variables: DEFAULT
    tolerance_class: EQUIVALENCE_LOOSE
    gpu:
      runner: m7_l2_d02_replay
      run_id: 20260521_18z_l2_72h_20260522T133443Z
      run_root: <DATA_ROOT>/canairy_meteo/runs/wrf_l2
      domain: d02
      full_hours: 72
      smoke_hours: 1

  - case_id: idealized_warm_bubble
    type: idealized
    status: BLOCKED
    blocked_reason: >
      No stock CPU WRF idealized warm-bubble Oracle output is present in this
      repository or in the configured Gen2 run archive. The in-tree analytic IC
      builder is useful metadata but is not a CPU WRF forecast Oracle.
    oracle:
      kind: cpu_wrf_idealized
      domain: d01
      expected_forecast_hours: 1
      expected_wrfout_count_including_initial: 2
      generation_command: >
        taskset -c 0-3 bash -lc 'source /home/user/src/canairy_meteo/Gen2/artifacts/wrf_gpu_src/env_wrf_gpu.sh
        && cd <prepared-WRF-em_quarter_ss-warm-bubble-run-directory>
        && mpirun -np 4 /home/user/src/wrf_gpu/builds/stable_20260509T213321Z/wrf.exe'
    expected_variables:
      - theta
      - U
      - W
    tolerance_class: BITWISE
    gpu:
      runner: idealized_gpu_runner
      full_hours: 1
      smoke_hours: 1

  - case_id: idealized_density_current
    type: idealized
    status: BLOCKED
    blocked_reason: >
      No stock CPU WRF density-current Oracle output is present in this
      repository or in the configured Gen2 run archive. The in-tree Straka IC
      builder is useful metadata but is not a CPU WRF forecast Oracle.
    oracle:
      kind: cpu_wrf_idealized
      domain: d01
      expected_forecast_hours: 1
      expected_wrfout_count_including_initial: 2
      generation_command: >
        taskset -c 0-3 bash -lc 'source /home/user/src/canairy_meteo/Gen2/artifacts/wrf_gpu_src/env_wrf_gpu.sh
        && cd <prepared-WRF-density-current-run-directory>
        && mpirun -np 4 /home/user/src/wrf_gpu/builds/stable_20260509T213321Z/wrf.exe'
    expected_variables:
      - theta
      - U
      - W
    tolerance_class: BITWISE
    gpu:
      runner: idealized_gpu_runner
      full_hours: 1
      smoke_hours: 1

  - case_id: canary_20260521_24h_d03
    type: real
    status: AVAILABLE
    oracle:
      kind: cpu_wrf
      run_dir: <DATA_ROOT>/canairy_meteo/runs/wrf_l3/20260521_18z_l3_24h_20260522T133443Z
      domain: d03
      expected_forecast_hours: 24
      expected_wrfout_count_including_initial: 25
      source_note: Existing Gen2 CPU WRF L3 24h d03 nest from the same run.
    expected_variables: DEFAULT
    tolerance_class: EQUIVALENCE_TIGHT
    gpu:
      runner: m7_daily_pipeline
      run_id: 20260521_18z_l3_24h_20260522T133443Z
      run_root: <DATA_ROOT>/canairy_meteo/runs/wrf_l3
      domain: d03
      full_hours: 24
      smoke_hours: 1
