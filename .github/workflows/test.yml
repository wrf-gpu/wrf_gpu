name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest-cpu:
    name: Unit tests (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-xdist

      - name: List installed packages
        run: pip list

      - name: Run CPU-safe tests
        run: |
          # GPU-dependent tests are skipped automatically when no GPU is present.
          # We deliberately run with -k to exclude tests that require external data.
          pytest -q tests/ \
            -k "not gpu and not canairy and not gen2 and not artifacts_present" \
            --maxfail=10 \
            -x
        env:
          JAX_PLATFORMS: cpu
